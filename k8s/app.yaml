apiVersion: apps/v1
kind: Deployment
metadata:
  name: latency-app
  namespace: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: latency-app
  template:
    metadata:
      labels:
        app: latency-app
    spec:
      containers:
      - name: app
        image: ghcr.io/stefanprodan/podinfo:6.3.6
        ports:
        - containerPort: 9898